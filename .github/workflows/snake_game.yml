name: Generate Snake Game

permissions:
  contents: read

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (read-only credentials)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate Snake Game
        uses: Platane/snk@e2cedf76a2c05b25d09a6428ded69727b497a700
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
        # 不給這一步任何寫入 token（假設該 action只做讀取與輸出）

      - name: Commit and push generated files to widgets branch (minimal token exposure)
        if: always()
        env:
          REPO: ${{ github.repository }}
          BRANCH: widgets              # <- 若要改成 widgets-snake-game，改這裡
          GIT_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_NAME: github-actions
          # 預設使用 GITHUB_TOKEN；若要使用 PAT，改為 ${{ secrets.REPO_PAT }} 並在 repo secrets 新增 REPO_PAT
          TOKEN: ${{ secrets.REPO_PAT }}
          TMP_DIR: tmp-widgets
        run: |
          set -euo pipefail

          WORKDIR="$GITHUB_WORKSPACE"
          # 如果沒有生成檔，結束
          if [ ! -d "${WORKDIR}/dist" ]; then
            echo "No dist directory found, nothing to push."
            exit 0
          fi
          if [ -z "$(ls -A ${WORKDIR}/dist 2>/dev/null || true)" ]; then
            echo "dist is empty, nothing to push."
            exit 0
          fi

          # 建立臨時 repo 只放 dist（避免改動 main 的歷史）
          rm -rf "${WORKDIR}/${TMP_DIR}"
          mkdir -p "${WORKDIR}/${TMP_DIR}"
          cd "${WORKDIR}/${TMP_DIR}"
          git init
          git config user.email "${GIT_EMAIL}"
          git config user.name "${GIT_NAME}"

          # 複製 dist 內容到臨時 repo
          cp -R "${WORKDIR}/dist" .

          # 若沒有要提交的變更則退出
          if [ -z "$(git status --porcelain 2>/dev/null || true)" ]; then
            echo "No files staged for commit."
            exit 0
          fi

          git add -A
          git commit -m "Update widgets artifacts [skip ci]"

          # 強制推送到目標 branch（會覆寫該 branch 的內容為這次 dist 的 tree）
          # 若你不想強制覆寫，去掉 --force，但若 branch 結構不同可能推送會被拒絕
          git push "https://x-access-token:${TOKEN}@github.com/${REPO}.git" HEAD:refs/heads/${BRANCH}

          echo "Pushed dist to ${BRANCH} branch."
