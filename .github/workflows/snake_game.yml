name: Generate Snake Game

permissions:
  contents: write

on:
  schedule:
    - cron: "0 5 * * *"
  push:
    branches: [ "widgets-snake" ]
  pull_request:
    branches: [ "widgets-snake" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate Snake Game
        uses: Platane/snk@e2cedf76a2c05b25d09a6428ded69727b497a700
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
        # 注意：這一步不再傳入 GITHUB_TOKEN（若該 action確實不需要 repo 寫入）

      - name: Commit and push generated files to widgets-snake
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: github-actions[bot]@users.noreply.github.com
          message: 'Update snake game [skip ci]'
          add: 'dist/**'
          branch: 'widgets-snake'
          token: ${{ secrets.GITHUB_TOKEN }}
